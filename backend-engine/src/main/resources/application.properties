spring.application.name=engine

# PostgreSQL Database Connection Settings (Uses Render vars with local fallbacks)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/koncertify}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# Redis Connection Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Prevent Redis connection check from crashing the engine on start
spring.data.redis.repositories.enabled=false
# Keep the connection pool from hanging indefinitely if Redis is down
spring.data.redis.timeout=2000ms

management.endpoints.web.exposure.include=health,info
server.port=${PORT:10000}
    
# Force Actuator endpoints to return the required CORS authorization headers
management.endpoints.web.cors.allowed-origins=https://koncert-ify.vercel.app
management.endpoints.web.cors.allowed-methods=GET,OPTIONS

# Speed up startup by initializing database connections lazily as needed
spring.datasource.hikari.initialization-fail-timeout=-1

# Prevent the connection pool from holding up the application boot thread
spring.datasource.lazy-initialization=true

# Keep the connection pool lightweight for development/free tiers
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3