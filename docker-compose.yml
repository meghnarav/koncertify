version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: koncertify-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: koncertify
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    container_name: koncertify-cache
    ports:
      - "6379:6379"

volumes:
  pgdata: